kind: Ingress
metadata:
  name: woodpecker-ingress
  namespace: woodpecker
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: |
      kube-system-infra-rate-limit@kubernetescrd,
      kube-system-infra-security-headers@kubernetescrd
  labels:
    app.kubernetes.io/name: woodpecker
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  ingressClassName: traefik
  rules:
    - host: woodpecker.kudofools.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
