apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/instance: cloudflared-prod
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/instance: cloudflared-prod
        app.kubernetes.io/part-of: kudofools
        app.kubernetes.io/managed-by: flux
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.6.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - --metrics
            - 0.0.0.0:2000
            - run
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
            - name: creds
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: creds
          secret:
            secretName: cloudflared-credentials
        - name: tmp
          emptyDir: {}
