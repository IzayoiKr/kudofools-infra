apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openbao
  namespace: default
  labels:
    app: openbao
spec:
  replicas: 1
  serviceName: openbao
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: openbao
  template:
    metadata:
      labels:
        app: openbao
    spec:
      serviceAccountName: openbao
      securityContext:
        fsGroup: 1000
      containers:
        - name: openbao
          image: openbao/openbao:2.5.5
          args:
            - server
            - -config
            - /etc/openbao/config/openbao.hcl
          ports:
            - containerPort: 8200
              name: api
          env:
            - name: BAO_ADDR
              value: http://localhost:8200
          securityContext:
            runAsUser: 100
            runAsGroup: 1000
            capabilities:
              add:
                - IPC_LOCK
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=200
              port: 8200
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/openbao/config
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: openbao-config
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: default
spec:
  clusterIP: 10.43.82.1
  selector:
    app: openbao
  ports:
    - port: 8200
      targetPort: 8200
