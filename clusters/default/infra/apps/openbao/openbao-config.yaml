apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
data:
  openbao.hcl: |
    ui = true
    storage "file" {
      path = "/data"
    }
    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = true
    }
    api_addr = "http://openbao.openbao.svc:8200"
