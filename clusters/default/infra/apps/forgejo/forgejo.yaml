apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/instance: forgejo-prod
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo
        app.kubernetes.io/instance: forgejo-prod
        app.kubernetes.io/part-of: kudofools
        app.kubernetes.io/managed-by: flux
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-config
          image: alpine:3.24.1
          command:
            [
              "sh",
              "-c",
              "mkdir -p /data/gitea/conf && cp /etc/forgejo-config/app.ini /data/gitea/conf/app.ini && chown 1000:1000 /data/gitea/conf/app.ini",
            ]
          volumeMounts:
            - name: forgejo-config
              mountPath: /etc/forgejo-config
            - name: forgejo-storage
              mountPath: /data
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:15.0.3
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: GITEA_WORK_DIR
              value: /data
            - name: FORGEJO__SERVER__LFS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: LFS_JWT_SECRET
            - name: FORGEJO__SECURITY__INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: INTERNAL_TOKEN
            - name: FORGEJO__OAUTH2__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: JWT_SECRET
          ports:
            - containerPort: 3000
              name: http
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: forgejo-storage
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: forgejo-storage
          persistentVolumeClaim:
            claimName: forgejo-data-pvc
        - name: forgejo-config
          configMap:
            name: forgejo-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-service
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    app.kubernetes.io/name: forgejo
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
