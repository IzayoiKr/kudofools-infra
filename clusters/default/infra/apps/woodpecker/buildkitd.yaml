apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: buildkitd
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/instance: buildkitd-prod
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkitd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkitd
        app.kubernetes.io/instance: buildkitd-prod
        app.kubernetes.io/part-of: kudofools
        app.kubernetes.io/managed-by: flux
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.31.2-rootless
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
          ports:
            - containerPort: 1234
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: Unconfined
            appArmorProfile:
              type: Unconfined
            readOnlyRootFilesystem: true
          startupProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "4"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: cache
              mountPath: /home/user/.local/share/buildkit
            - name: tmp
              mountPath: /tmp
            - name: local-tmp
              mountPath: /home/user/.local/tmp
            - name: run
              mountPath: /run
            - name: cache-home
              mountPath: /home/user/.cache
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkitd-cache-pvc
        - name: tmp
          emptyDir: {}
        - name: local-tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: cache-home
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd-service
  namespace: buildkitd
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    app.kubernetes.io/name: buildkitd
  ports:
    - protocol: TCP
      port: 1234
      targetPort: 1234
