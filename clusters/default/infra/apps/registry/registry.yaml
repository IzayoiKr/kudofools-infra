apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/instance: registry-prod
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
        app.kubernetes.io/instance: registry-prod
        app.kubernetes.io/part-of: kudofools
        app.kubernetes.io/managed-by: flux
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: registry
          image: registry:3.1.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 5000
          resources:
            limits:
              memory: 512Mi
              cpu: "500m"
            requests:
              memory: 128Mi
              cpu: "100m"
          livenessProbe:
            httpGet:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/docker/registry/config.yml
              subPath: config.yml
            - name: auth
              mountPath: /etc/docker/registry/auth.htpasswd
              subPath: auth.htpasswd
            - name: registry-data
              mountPath: /var/lib/registry
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: registry-config
        - name: auth
          secret:
            secretName: registry-auth
        - name: registry-data
          persistentVolumeClaim:
            claimName: registry-data-pvc
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: registry-service
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    app.kubernetes.io/name: registry
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
